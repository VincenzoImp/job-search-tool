name: job-search-tool

# Two long-running services sharing a single /data volume.
#
#   scheduler  → slim core image, runs the continuous scheduled search loop
#                (Telegram notifications included)
#   dashboard  → dashboard image, serves the Streamlit UI on :8501
#
# First run auto-scaffolds ./data/config/settings.yaml from the bundled
# template — edit it and restart to apply.

services:
  scheduler:
    image: vincenzoimp/job-search-tool:latest-core
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data

  dashboard:
    image: vincenzoimp/job-search-tool:latest
    restart: unless-stopped
    command: streamlit run dashboard.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "${JOB_SEARCH_DASHBOARD_PORT:-8501}:8501"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
