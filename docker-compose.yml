name: job-search-tool

x-job-search-base: &job-search-base
  image: ${JOB_SEARCH_IMAGE:-vincenzoimp/job-search-tool:latest}
  user: "${JOB_SEARCH_UID:-1000}:${JOB_SEARCH_GID:-1000}"
  env_file:
    - path: .env
      required: false
  volumes:
    - ./config:/app/config
    - ./data:/app/data
    - ./results:/app/results
    - ./logs:/app/logs

services:
  init-config:
    <<: *job-search-base
    command: python bootstrap_config.py --write-settings
    restart: "no"

  jobsearch:
    <<: *job-search-base
    command: python main.py
    environment:
      JOB_SEARCH_MODE: single
    restart: on-failure:3

  scheduler:
    <<: *job-search-base
    command: python main.py
    environment:
      JOB_SEARCH_MODE: scheduled
    restart: unless-stopped
    profiles:
      - scheduler

  analyze:
    <<: *job-search-base
    command: python analyze_jobs.py
    restart: on-failure:3
    profiles:
      - analyze

  dashboard:
    <<: *job-search-base
    command: streamlit run dashboard.py --server.address=0.0.0.0 --server.port=8501
    restart: unless-stopped
    ports:
      - "${JOB_SEARCH_DASHBOARD_PORT:-8501}:8501"
    profiles:
      - dashboard
