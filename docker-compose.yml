name: job-search-tool

# Two long-running services sharing a single /data volume, built from the
# same Docker image. They differ only by the subcommand they run:
#
#   scheduler  → `python main.py scheduler`  (default; continuous search loop)
#   dashboard  → `python main.py dashboard`  (Streamlit UI on :8501)
#
# First run auto-scaffolds ./data/config/settings.yaml from the bundled
# template — edit it and restart the scheduler to apply.

services:
  scheduler:
    image: vincenzoimp/job-search-tool:latest
    restart: unless-stopped
    command: ["python", "main.py", "scheduler"]
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data

  dashboard:
    image: vincenzoimp/job-search-tool:latest
    restart: unless-stopped
    command: ["python", "main.py", "dashboard"]
    ports:
      - "${JOB_SEARCH_DASHBOARD_PORT:-8501}:8501"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
