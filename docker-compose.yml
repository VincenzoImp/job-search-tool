name: jobsearch

# Two long-running services sharing a single Docker-managed named volume
# for all application state (database, vector store, results, logs). The
# user-provided settings.yaml is bind-mounted as a read-only file so it can
# be edited with any host-side editor.
#
#   scheduler  → `python main.py scheduler`  (continuous search loop)
#   dashboard  → `python main.py dashboard`  (Streamlit UI on :8501)
#
# Both containers run as non-root (`appuser`, UID 1000) in every environment —
# no host-side `chown`, no UID override, no privileged init. The named volume
# inherits ownership from the image; settings.yaml is read-only so the
# mismatch between host UID and container UID doesn't matter.
#
# Network defaults harden a couple of common home-lab / cloud-VM edge cases:
# IPv6 is disabled on the stack bridge (prevents [Errno 113] No route to host
# from broken dual-stack routing) and explicit public DNS resolvers bypass
# the embedded Docker DNS → host DNS chain.

networks:
  default:
    name: jobsearch
    enable_ipv6: false

volumes:
  jobsearch-data:
    name: jobsearch-data

services:
  scheduler:
    image: vincenzoimp/job-search-tool:latest
    container_name: jobsearch-scheduler
    restart: unless-stopped
    command: ["python", "main.py", "scheduler"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - path: .env
        required: false
    volumes:
      - jobsearch-data:/data
      - ./settings.yaml:/data/config/settings.yaml:ro

  dashboard:
    image: vincenzoimp/job-search-tool:latest
    container_name: jobsearch-dashboard
    restart: unless-stopped
    command: ["python", "main.py", "dashboard"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${JOB_SEARCH_DASHBOARD_PORT:-8501}:8501"
    env_file:
      - path: .env
        required: false
    volumes:
      - jobsearch-data:/data
      - ./settings.yaml:/data/config/settings.yaml:ro

  api:
    image: vincenzoimp/job-search-tool:latest
    container_name: jobsearch-api
    restart: unless-stopped
    command: ["python", "api_server.py"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${JOB_SEARCH_API_PORT:-8502}:8502"
    env_file:
      - path: .env
        required: false
    volumes:
      - jobsearch-data:/data
      - ./settings.yaml:/data/config/settings.yaml:ro
    profiles:
      - api

  mcp:
    image: vincenzoimp/job-search-tool:latest
    container_name: jobsearch-mcp
    restart: unless-stopped
    command: ["python", "mcp_server.py"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${JOB_SEARCH_MCP_PORT:-3001}:3001"
    env_file:
      - path: .env
        required: false
    volumes:
      - jobsearch-data:/data
    profiles:
      - mcp
