# Override that rebuilds the single image from the local checkout and gives
# the resulting containers distinct names so they can coexist with a
# pull-based `docker compose up` from the same folder.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build -d

x-local-build: &local-build
  build:
    context: .
  image: ${JOB_SEARCH_DEV_IMAGE:-job-search-tool:dev}

services:
  scheduler:
    <<: *local-build
    container_name: jobsearch-scheduler-dev

  dashboard:
    <<: *local-build
    container_name: jobsearch-dashboard-dev
