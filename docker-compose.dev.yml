# Override that rebuilds the two service images from the local checkout.
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  scheduler:
    build:
      context: .
      args:
        VARIANT: core
    image: ${JOB_SEARCH_DEV_CORE_IMAGE:-job-search-tool:dev-core}

  dashboard:
    build:
      context: .
      args:
        VARIANT: dashboard
    image: ${JOB_SEARCH_DEV_DASHBOARD_IMAGE:-job-search-tool:dev}
