name: Publish Docker Image (Release)

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-docker-release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE || 'vincenzoimp/job-search-tool' }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Dashboard variant: default, tagged without suffix (`:latest`, `:vX.Y.Z`, ...)
          - variant: dashboard
            tag_suffix: ""
            latest_tag: "latest"
          # Core variant: slim, tagged with `-core` suffix (`:latest-core`, `:vX.Y.Z-core`, ...)
          - variant: core
            tag_suffix: "-core"
            latest_tag: "latest-core"

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{version}},suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{major}},suffix=${{ matrix.tag_suffix }}
            type=raw,value=${{ matrix.latest_tag }}

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=publish-release-${{ matrix.variant }}
          cache-to: type=gha,scope=publish-release-${{ matrix.variant }},mode=max
          sbom: true
          provenance: mode=max
          build-args: |
            VARIANT=${{ matrix.variant }}
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
