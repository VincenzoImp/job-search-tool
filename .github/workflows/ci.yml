name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_VERSION: "0.11.6"
  UV_TORCH_BACKEND: cpu

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          cache-suffix: py${{ matrix.python-version }}-ci

      - name: Sync dependencies
        run: uv sync --locked --no-install-project

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Type check with mypy
        run: uv run mypy scripts/ --ignore-missing-imports
        continue-on-error: false

      - name: Run tests
        run: uv run pytest --cov=scripts --cov-report=xml --cov-fail-under=60

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          cache-suffix: security

      - name: Export runtime requirements
        run: |
          mkdir -p .tmp
          uv export --frozen --no-dev --no-emit-project --output-file .tmp/requirements-audit.txt

      - name: Security audit
        run: uvx --python 3.11 --from 'pip-audit==2.9.0' pip-audit --ignore-vuln CVE-2025-46656 -r .tmp/requirements-audit.txt  # markdownify pinned by python-jobspy<0.14.0

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: job-search-tool:test
          cache-from: type=gha,scope=ci-docker
          cache-to: type=gha,scope=ci-docker,mode=max
          provenance: false
          sbom: false

      - name: Test health check
        run: |
          docker run --rm job-search-tool:test python healthcheck.py || echo "Health check requires config file - expected in CI"
