name: Publish Docker Image (Main)

on:
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - "Dockerfile"
      - "docker/**"
      - "docker-compose.yml"
      - "scripts/**"
      - "config/settings.example.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/publish-main.yml"
      - ".github/workflows/publish-release.yml"
  workflow_dispatch:

concurrency:
  group: publish-docker-main-${{ github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE || 'vincenzoimp/job-search-tool' }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=publish-main-amd64
          cache-to: type=gha,scope=publish-main-amd64,mode=max
          provenance: false
          sbom: false
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
