[pytest]
testpaths = tests
pythonpath = src
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
asyncio_mode = auto
# Surface deprecations as failures so upcoming breakage in our code or in a
# freshly-bumped dependency is caught early. When a third-party deprecation is
# genuinely unavoidable, add a targeted allowlist entry above the error rules
# rather than re-blanket-ignoring, e.g.:
#   ignore:some message:DeprecationWarning:offending.module
filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning
